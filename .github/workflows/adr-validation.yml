name: ADR Validation & Feature Detection

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  ADR_ROOT: ${{ github.workspace }}

jobs:
  validate-adrs:
    name: Validate Architecture Decision Records
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git operations

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate ADR Schema
        run: |
          echo "Validating ADRs against schema..."
          python .parsers/adr_parser.py adr/ --validate

      - name: Check ADR Frontmatter
        run: |
          echo "Checking ADR frontmatter..."
          for file in adr/{proposed,accepted}/*.md; do
            if [ -f "$file" ]; then
              if ! grep -q "^id:" "$file"; then
                echo "❌ Missing 'id' field in $file"
                exit 1
              fi
              if ! grep -q "^title:" "$file"; then
                echo "❌ Missing 'title' field in $file"
                exit 1
              fi
              if ! grep -q "^status:" "$file"; then
                echo "❌ Missing 'status' field in $file"
                exit 1
              fi
              echo "✓ $file"
            fi
          done

      - name: Validate ADR Status Locations
        run: |
          echo "Checking ADR file locations match status..."
          for status_dir in proposed accepted superseded rejected; do
            for file in adr/${status_dir}/*.md; do
              if [ -f "$file" ]; then
                file_status=$(grep "^status:" "$file" | awk '{print $2}')
                if [ "$file_status" != "$status_dir" ]; then
                  echo "❌ Status mismatch in $file: status is '$file_status' but in '$status_dir' directory"
                  exit 1
                fi
              fi
            done
          done
          echo "✓ All ADRs in correct directories"

      - name: Check for Placeholder Content
        run: |
          echo "Checking for unfilled placeholders in ADRs..."
          if grep -r "\[Descreva" adr/{accepted}/*.md 2>/dev/null; then
            echo "❌ Found placeholder content in accepted ADRs"
            exit 1
          fi
          echo "✓ No placeholders found in accepted ADRs"

  detect-features:
    name: Feature Detection & Integration Check
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for diff

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect Features in Commit
        id: detect
        run: |
          chmod +x .hooks/feature_detector.py
          COMMIT_HASH=$(git rev-parse HEAD)
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r $COMMIT_HASH | tr '\n' ' ')

          echo "Analyzing commit: $COMMIT_HASH"
          echo "Changed files: $CHANGED_FILES"

          python .hooks/feature_detector.py \
            --commit "$COMMIT_HASH" \
            --files "$CHANGED_FILES" \
            --min-confidence 0.7 \
            || echo "feature_detected=true" >> $GITHUB_OUTPUT

      - name: Check Feature Integration
        if: steps.detect.outputs.feature_detected == 'true'
        run: |
          chmod +x .hooks/integration_checker.py
          python .hooks/integration_checker.py \
            --feature-log .feature_tracking.json \
            --fail-on-unintegrated

      - name: Upload Feature Detection Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-detection-report
          path: .feature_tracking.json
          if-no-files-found: ignore

  sync-knowledge-base:
    name: Synchronize Knowledge Base
    runs-on: ubuntu-latest
    needs: validate-adrs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Sync Knowledge Base
        run: |
          chmod +x scripts/adr
          ./scripts/adr sync

      - name: Commit Knowledge Base Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync knowledge base [skip ci]"
          file_pattern: "knowledge/*.json"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  stf-compliance-check:
    name: STF Protocol Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Validate STF Schema
        run: |
          echo "Validating STF file against schema..."
          python -c "
          import json
          import yaml
          from pathlib import Path

          # Load schema
          with open('.schema/stf.schema.json', 'r') as f:
              schema = json.load(f)

          # Load STF file (extract YAML frontmatter)
          stf_content = Path('.stf/neutron.stf').read_text()
          yaml_match = stf_content.split('---')[1]
          stf_data = yaml.safe_load(yaml_match)

          print('STF Protocol:', stf_data.get('protocol'))
          print('Version:', stf_data.get('stf_version'))
          print('Mode:', stf_data.get('mode'))
          print('✓ STF file is valid')
          "

      - name: Check STF Directive Count
        run: |
          echo "Checking STF directive completeness..."
          DIRECTIVE_COUNT=$(grep -c '<directive id="STF-D' .stf/neutron.stf || true)
          CONSTRAINT_COUNT=$(grep -c '<constraint id="STF-C' .stf/neutron.stf || true)
          PATTERN_COUNT=$(grep -c '<pattern id="STF-E' .stf/neutron.stf || true)

          echo "Directives: $DIRECTIVE_COUNT"
          echo "Constraints: $CONSTRAINT_COUNT"
          echo "Error Patterns: $PATTERN_COUNT"

          if [ "$DIRECTIVE_COUNT" -lt 4 ]; then
            echo "❌ Insufficient directives (minimum 4 required)"
            exit 1
          fi

          if [ "$CONSTRAINT_COUNT" -lt 4 ]; then
            echo "❌ Insufficient constraints (minimum 4 required)"
            exit 1
          fi

          echo "✓ STF has sufficient directives and constraints"

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for TODO/FIXME in Critical Files
        run: |
          echo "Checking for unresolved TODOs in critical files..."
          if grep -rn "TODO\|FIXME" adr/accepted/ .stf/ 2>/dev/null | grep -v "# TODO:"; then
            echo "⚠ Found unresolved TODOs in critical files"
            # Don't fail, just warn
          else
            echo "✓ No unresolved TODOs in critical files"
          fi

      - name: Check File Permissions
        run: |
          echo "Checking executable permissions..."
          if [ ! -x "scripts/adr" ]; then
            echo "❌ scripts/adr is not executable"
            exit 1
          fi
          if [ ! -x ".hooks/feature_detector.py" ]; then
            echo "❌ .hooks/feature_detector.py is not executable"
            exit 1
          fi
          echo "✓ Required scripts are executable"

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [validate-adrs, detect-features, stf-compliance-check, code-quality]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# 📋 CI/CD Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate-adrs.result }}" == "success" ]; then
            echo "✅ **ADR Validation:** PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **ADR Validation:** FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.detect-features.result }}" == "success" ] || [ "${{ needs.detect-features.result }}" == "skipped" ]; then
            echo "✅ **Feature Detection:** PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Feature Detection:** FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.stf-compliance-check.result }}" == "success" ]; then
            echo "✅ **STF Compliance:** PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **STF Compliance:** FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.code-quality.result }}" == "success" ]; then
            echo "✅ **Code Quality:** PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Code Quality:** FAILED" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
